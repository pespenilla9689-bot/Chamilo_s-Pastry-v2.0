<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard Chamilo's Pastry</title>
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>

  <!-- ── Sidebar ── -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar-brand">
      <img src="/assets/logo.png" alt="Logo" />
      <span>Chamilo's<br>Admin</span>
    </div>

    <nav class="admin-nav">
      <button class="admin-nav-link active" data-section="dashboard">Dashboard</button>
      <button class="admin-nav-link" data-section="orders">Orders</button>
      <button class="admin-nav-link" data-section="products" data-min-role="manager">Products</button>
      <button class="admin-nav-link" data-section="customers" data-min-role="manager">Customers</button>
      <button class="admin-nav-link" data-section="analytics" data-min-role="manager">Analytics</button>
      <button class="admin-nav-link" data-section="feedbacks" data-min-role="staff">Feedbacks</button>
      <button class="admin-nav-link" data-section="content" data-min-role="admin">Content</button>
      <button class="admin-nav-link" data-section="staff" data-min-role="admin">Staff</button>
    </nav>

    <div class="admin-sidebar-footer">
      <div class="admin-role-badge" id="sidebarRole">Admin</div>
      <a href="/html/index.html" class="admin-view-site-btn" target="_blank">↗ View Website</a>
      <button class="admin-logout" id="adminLogout">Log out</button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="admin-main">

    <header class="admin-header">
      <h1 class="admin-header-title" id="sectionTitle">Dashboard</h1>
      <div class="admin-header-right">
        <button class="admin-account-btn" id="adminAccountBtn" title="Account Details">
          <span id="headerUser">admin@chamilos.com</span>
        </button>
      </div>
    </header>

    <div class="admin-content">

      <!-- ── Dashboard ── -->
      <div id="section-dashboard" class="admin-section">
        <div class="admin-stats-grid">
          <div class="admin-stat-card">
            <div class="admin-stat-value" id="statTotalOrders">0</div>
            <div class="admin-stat-label">Total Orders</div>
          </div>
          <div class="admin-stat-card">
            <div class="admin-stat-value" id="statRevenue">₱0</div>
            <div class="admin-stat-label">Total Revenue</div>
          </div>
          <div class="admin-stat-card">
            <div class="admin-stat-value" id="statPending">0</div>
            <div class="admin-stat-label">Pending</div>
          </div>
          <div class="admin-stat-card">
            <div class="admin-stat-value" id="statCompleted">0</div>
            <div class="admin-stat-label">Delivered</div>
          </div>
        </div>
        <div class="admin-panel">
          <div class="admin-panel-header">Recent Orders</div>
          <div id="recentOrdersList"></div>
        </div>
      </div>

      <!-- ── Orders ── -->
      <div id="section-orders" class="admin-section" style="display:none">
        <div class="admin-filter-bar" id="orderFilterBar">
          <button class="admin-filter-btn active" data-filter="pending">Pending</button>
          <button class="admin-filter-btn" data-filter="processing">Processing</button>
          <button class="admin-filter-btn" data-filter="ready-for-pickup">Ready for Pickup</button>
          <button class="admin-filter-btn" data-filter="delivered">Delivered</button>
        </div>
        <div id="ordersContainer"></div>
      </div>

      <!-- ── Products ── -->
      <div id="section-products" class="admin-section" style="display:none">
        <div class="admin-toolbar">
          <div class="admin-tab-bar" id="productTabBar">
            <button class="admin-tab active" data-tab="featured">Index — Featured Cakes</button>
            <button class="admin-tab" data-tab="signature">Menu — Signature Carousel</button>
            <button class="admin-tab" data-tab="fullmenu">Menu — Full Menu</button>
          </div>
          <button class="admin-btn-primary" id="addProductBtn">+ Add Product</button>
        </div>
        <div id="productsContainer"></div>
      </div>

      <!-- ── Customers ── -->
      <div id="section-customers" class="admin-section" style="display:none">
        <div class="admin-panel">
          <div class="admin-panel-header">Customer Database — loyalty points: ₱100 spent = 1 pt</div>
          <div id="customersContainer"></div>
        </div>
      </div>

      <!-- ── Analytics ── -->
      <div id="section-analytics" class="admin-section" style="display:none">
        <div class="admin-tab-bar" id="analyticsTabBar">
          <button class="admin-tab active" data-tab="today">Today</button>
          <button class="admin-tab" data-tab="week">This Week</button>
          <button class="admin-tab" data-tab="month">This Month</button>
          <button class="admin-tab" data-tab="alltime">All Time</button>
        </div>
        <div class="admin-stats-grid" id="analyticsStats"></div>
        <div class="admin-panel">
          <div class="admin-panel-header">Popular Products</div>
          <div id="popularProducts" class="panel-body"></div>
        </div>
        <div class="admin-panel">
          <div class="admin-panel-header">Revenue by Day</div>
          <div id="revenueChart" class="panel-body chart-wrap"></div>
        </div>
      </div>

      <!-- ── Feedbacks ── -->
      <div id="section-feedbacks" class="admin-section" style="display:none">
        <div id="feedbacksContainer"></div>
      </div>

      <!-- ── Content ── -->
      <div id="section-content" class="admin-section" style="display:none">
        <div class="admin-tab-bar" id="contentTabBar">
          <button class="admin-tab active" data-tab="about">About Page</button>
          <button class="admin-tab" data-tab="contact">Contact Page</button>
        </div>
        <div id="contentContainer"></div>
      </div>

      <!-- ── Staff ── -->
      <div id="section-staff" class="admin-section" style="display:none">
        <div class="admin-toolbar">
          <h2 class="section-subtitle">Staff Members</h2>
          <button class="admin-btn-primary" id="addStaffBtn">+ Add Staff</button>
        </div>
        <div class="admin-panel">
          <div id="staffContainer"></div>
        </div>
      </div>

    </div><!-- /admin-content -->
  </div><!-- /admin-main -->

  <!-- ── Product Modal ── -->
  <div id="productModal" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <div class="modal-header">
        <span id="productModalTitle">Add Product</span>
        <button class="modal-close" id="closeProductModal">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editProductId" value="" />
        <div class="form-group">
          <label>Category</label>
          <select id="productCategory" class="form-control">
            <option value="featured">Index — Featured Cakes</option>
            <option value="signature">Menu — Signature Carousel</option>
            <option value="fullmenu">Menu — Full Menu</option>
          </select>
        </div>
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="productName" class="form-control" placeholder="e.g. Strawberry Dream Cake" />
        </div>
        <div class="form-group">
          <label>Price (₱)</label>
          <input type="number" id="productPrice" class="form-control" placeholder="e.g. 1500" min="0" />
        </div>
        <div class="form-group">
          <label>Tag <small>(optional, e.g. Best Seller)</small></label>
          <input type="text" id="productTag" class="form-control" placeholder="e.g. Best Seller" />
        </div>
        <div class="form-group">
          <label>Image</label>
          <div class="img-upload-wrap" id="imgUploadWrap">
            <img id="productImgPreview" src="" alt="" class="img-preview" style="display:none" />
            <div class="img-upload-placeholder" id="imgUploadPlaceholder">
              <span>Click to upload image</span>
            </div>
            <input type="file" id="productImgFile" accept="image/*" class="img-upload-input" />
          </div>
          <input type="hidden" id="productImgData" value="" />
        </div>
        <p id="productModalError" class="form-error" style="display:none"></p>
      </div>
      <div class="modal-footer">
        <button class="admin-btn-secondary" id="cancelProductBtn">Cancel</button>
        <button class="admin-btn-primary" id="saveProductBtn">Save Product</button>
      </div>
    </div>
  </div>

  <!-- ── Staff Modal ── -->
  <div id="staffModal" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <div class="modal-header">
        <span>Add Staff Member</span>
        <button class="modal-close" id="closeStaffModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="staffName" class="form-control" placeholder="e.g. Maria Santos" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="staffEmail" class="form-control" placeholder="e.g. maria@chamilos.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="staffPassword" class="form-control" placeholder="Set a login password" />
        </div>
        <div class="form-group">
          <label>Title <small>(optional, e.g. Head Baker)</small></label>
          <input type="text" id="staffTitle" class="form-control" placeholder="e.g. Head Baker, Order Manager" />
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="staffRole" class="form-control">
            <option value="staff">Staff — Orders only</option>
            <option value="manager">Manager — Orders, Products, Customers, Analytics</option>
            <option value="admin">Admin — Full access</option>
          </select>
        </div>
        <p id="staffModalError" class="form-error" style="display:none"></p>
      </div>
      <div class="modal-footer">
        <button class="admin-btn-secondary" id="cancelStaffBtn">Cancel</button>
        <button class="admin-btn-primary" id="saveStaffBtn">Add Member</button>
      </div>
    </div>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
